<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="portfolioGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#818CF8" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#portfolioGrad)"/>
  
  <!-- Abstract Code Window -->
  <rect x="200" y="150" width="400" height="300" rx="16" fill="#000000" opacity="0.5"/>
  <circle cx="230" cy="180" r="6" fill="#EF4444" />
  <circle cx="250" cy="180" r="6" fill="#F59E0B" />
  <circle cx="270" cy="180" r="6" fill="#10B981" />
  
  <!-- Code Lines -->
  <rect x="230" y="220" width="150" height="12" rx="6" fill="url(#codeGrad)" opacity="0.8"/>
  <rect x="230" y="250" width="250" height="12" rx="6" fill="#CBD5E1" opacity="0.4"/>
  <rect x="250" y="280" width="200" height="12" rx="6" fill="#CBD5E1" opacity="0.4"/>
  <rect x="250" y="310" width="280" height="12" rx="6" fill="#CBD5E1" opacity="0.4"/>
  <rect x="230" y="340" width="100" height="12" rx="6" fill="url(#codeGrad)" opacity="0.8"/>
  
  <text x="400" y="400" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">VIKRAM SINGH</text>
  <text x="400" y="430" font-family="Arial, sans-serif" font-size="18" fill="#94A3B8" text-anchor="middle" letter-spacing="4">PORTFOLIO</text>
</svg>
